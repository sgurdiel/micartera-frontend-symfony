name: PHPUnit test & Static code analysis

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - LICENSE
      - 'translations/**'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - LICENSE
      - 'translations/**'

env:
  XDEBUG_MODE: coverage

permissions:
  contents: read

jobs:
  load-versions:
    name: Load runtime versions
    runs-on: ubuntu-latest
    outputs:
      release_php: ${{ steps.set-outputs.outputs.release_php }}
      release_mysql: ${{ steps.set-outputs.outputs.release_mysql }}
      release_node: ${{ steps.set-outputs.outputs.release_node }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Read versions.env
        id: set-outputs
        run: |
          release_php=$(grep -E '^RELEASE_PHP=' versions.env | cut -d'=' -f2- | tr -d '\r')
          release_mysql=$(grep -E '^RELEASE_MYSQL=' versions.env | cut -d'=' -f2- | tr -d '\r')
          release_node=$(grep -E '^RELEASE_NODE=' versions.env | cut -d'=' -f2- | tr -d '\r')
          echo "release_php=$release_php" >> "$GITHUB_OUTPUT"
          echo "release_mysql=$release_mysql" >> "$GITHUB_OUTPUT"
          echo "release_node=$release_node" >> "$GITHUB_OUTPUT"

  build:
    name: micartera-frontend-symfony
    needs: load-versions

    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:${{ needs.load-versions.outputs.release_mysql }}
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: false
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: micartera_test
          MYSQL_HOST: 127.0.0.1
        ports:
          - 3306:3306/tcp
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    env:
      RELEASE_PHP: ${{ needs.load-versions.outputs.release_php }}
      RELEASE_MYSQL: ${{ needs.load-versions.outputs.release_mysql }}
      RELEASE_NODE: ${{ needs.load-versions.outputs.release_node }}
      APP_ENV: test
      APP_RELEASE: test
      APP_SECRET: kv95njkb5t90v89jtrbjh3bvdv
      DATABASE_URL: mysql://root:password@127.0.0.1:3306/micartera?serverVersion=${{ needs.load-versions.outputs.release_mysql }}
      TRUSTED_PROXIES:
      SYMFONY_DEPRECATIONS_HELPER: disabled=1

    strategy:
      fail-fast: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Setup devbox
      uses: jetify-com/devbox-install-action@v0.15.0
      with:
        # Caching the entire Nix store in github based on your devbox.json
        enable-cache: true
    
    - name: Setup mise
      uses: jdx/mise-action@v4
      with:
        install: true
        cache: true

    - name: Validate composer.json and composer.lock
      run: devbox run composer validate --strict

    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v5
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    - name: Install dependencies
      run: devbox run composer install --prefer-dist --no-progress --optimize-autoloader

    - name: Run Database setup
      run: |
        devbox run bin/console doctrine:database:create --if-not-exists --env=test || echo "Schema creation failed"
        devbox run bin/console doctrine:schema:drop --force --env=test || echo "Schema drop failed"
        devbox run bin/console doctrine:schema:create --env=test || echo "Schema create failed"
        devbox run bin/console doctrine:fixtures:load --no-interaction --env=test || echo "Fixtures load failed"

    - name: Install NPM dependencies
      run: npm ci

    - name: NPM Build
      run: npm run build

    - name: Run all test suites
      run: devbox run vendor/bin/phpunit --testsuite=all --coverage-text
       
    - name: Psalm static code analysis
      run: devbox run vendor/bin/psalm

    - name: Build Docker image
      run: |
        set -a
        . ./versions.env
        set +a
        docker build --build-arg RELEASE_PHP --build-arg RELEASE_NODE .
